		<button id="reset-btn" class="error-refresh-btn">Hard Reset & Refresh</button>

	<script>
		document.getElementById('reset-btn').onclick = function () {
			this.disabled = true;
			this.innerText = 'Resetting...';

			// 1. Clear session storage immediately
			try { sessionStorage.clear(); } catch (e) { }

			// 2. Trigger non-blocking Service Worker unregistration
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					for (var i = 0; i < regs.length; i++) {
						regs[i].unregister();
					}
				}).catch(function (e) { console.warn('SW reset failed', e); });
			}

			// 3. Trigger non-blocking Cache deletion
			if ('caches' in window) {
				caches.keys().then(function (keys) {
					for (var i = 0; i < keys.length; i++) {
						caches.delete(keys[i]);
					}
				}).catch(function (e) { console.warn('Cache reset failed', e); });
			}

			// 4. Force reload after a tiny delay (100ms) to allow the above triggers to fire.
			// We don't await them because they can hang indefinitely if the SW is broken.
			setTimeout(function () {
				window.location.replace('/?reload=' + Date.now());
			}, 100);
		};
	</script>
