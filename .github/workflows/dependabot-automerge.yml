name: Dependabot Automerge

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-automerge-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract PR Details
        id: pr_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          # Try extracting from payload first
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')
          
          echo "Debug: PR from payload: $PR_NUMBER"
          echo "Debug: Head branch: $HEAD_BRANCH"
          
          # Fallback to searching by head branch if payload is empty
          if [ "$PR_NUMBER" == "null" ] || [ -z "$PR_NUMBER" ]; then
            echo "PR not in payload, searching by head branch: $HEAD_BRANCH..."
            PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --repo "$REPO" --state all --json number -q '.[0].number' 2>&1)
            echo "Debug: PR lookup result: $PR_NUMBER"
          fi
          
          if [ "$PR_NUMBER" == "null" ] || [ -z "$PR_NUMBER" ]; then
            echo "Error: No pull request found for branch $HEAD_BRANCH"
            echo "Debug: Listing recent PRs:"
            gh pr list --repo "$REPO" --state all --json number,title,headRefName --limit 10
            exit 1
          fi
          
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "url=https://github.com/$REPO/pull/$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Resolved PR #$PR_NUMBER"

      - name: Determine auto-merge eligibility
        id: eligible
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name')
          TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q '.title')

          # Determine ecosystem from labels set in dependabot.yml
          IS_JS=false
          if echo "$LABELS" | grep -q "javascript"; then
            IS_JS=true
          fi

          # Parse version bump from PR title (e.g., "from 1.0.0 to 1.0.1" or "from 8 to 9")
          VERSION_REGEX='[0-9]+(\.[0-9]+)*'
          OLD_VER=$(echo "$TITLE" | grep -oP "from \K$VERSION_REGEX" || true)
          NEW_VER=$(echo "$TITLE" | grep -oP "to \K$VERSION_REGEX" || true)

          # Determine if it's GitHub Actions
          IS_ACTION=false
          if echo "$LABELS" | grep -q "github-actions"; then
            IS_ACTION=true
          fi

          UPDATE_TYPE="major"
          ALLOW_JS_MINOR=false
          TITLE_LOWER="${TITLE,,}"
          if [[ "$TITLE_LOWER" == *"bump the production-minor-patch group"* ]]; then
            UPDATE_TYPE="minor"
            ALLOW_JS_MINOR=true
          elif [[ "$TITLE_LOWER" == *"bump the dev-dependencies group"* ]]; then
            UPDATE_TYPE="minor"
            ALLOW_JS_MINOR=true
          elif [ -n "$OLD_VER" ] && [ -n "$NEW_VER" ]; then
            OLD_MAJOR=$(echo "$OLD_VER" | cut -d. -f1)
            OLD_MINOR=$(echo "$OLD_VER" | cut -d. -f2)
            NEW_MAJOR=$(echo "$NEW_VER" | cut -d. -f1)
            NEW_MINOR=$(echo "$NEW_VER" | cut -d. -f2)
            if [ "$OLD_MAJOR" != "$NEW_MAJOR" ]; then
              UPDATE_TYPE="major"
            elif [ "$OLD_MINOR" != "$NEW_MINOR" ]; then
              UPDATE_TYPE="minor"
            else
              UPDATE_TYPE="patch"
            fi
          fi

          echo "ecosystem_js=$IS_JS is_action=$IS_ACTION update_type=$UPDATE_TYPE"

          # Auto-merge eligibility:
          # 1. GitHub Actions: always merge (patch/minor/major)
          # 2. JS: patch only, or explicitly approved groups
          # 3. Rest (Docker, etc): patch or minor
          if [ "$IS_ACTION" == "true" ]; then
            echo "merge=true" >> $GITHUB_OUTPUT
          elif [ "$IS_JS" == "true" ] && ([ "$UPDATE_TYPE" == "patch" ] || [ "$ALLOW_JS_MINOR" == "true" ]); then
            echo "merge=true" >> $GITHUB_OUTPUT
          elif [ "$IS_JS" == "false" ] && ([ "$UPDATE_TYPE" == "patch" ] || [ "$UPDATE_TYPE" == "minor" ]); then
            echo "merge=true" >> $GITHUB_OUTPUT
          else
            echo "merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Approve Dependabot PR
        if: steps.eligible.outputs.merge == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
          REPO: ${{ github.repository }}
        run: gh pr review --approve "$PR_NUMBER" --repo "$REPO"

      - name: Enable auto-merge
        if: steps.eligible.outputs.merge == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge --merge "$PR_NUMBER" --repo "$REPO"