name: Dependabot Automerge

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Only run if the CI pipeline succeeded AND it was triggered by a Dependabot PR
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Extract PR Details
        id: pr_info
        run: |
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number')
          PR_URL=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].html_url')
          if [ "$PR_NUMBER" == "null" ] || [ -z "$PR_NUMBER" ]; then
            echo "Error: No pull request found for this workflow run."
            exit 1
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          # Explicitly pass the PR number from our extraction step
          pull-request-number: ${{ steps.pr_info.outputs.number }}

      - name: Enable auto-merge for non-npm patch and minor updates
        if: |
          steps.metadata.outputs.package-ecosystem != 'npm' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --merge "${{ steps.pr_info.outputs.url }}"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Approve Dependabot PR
        if: |
          steps.metadata.outputs.package-ecosystem != 'npm' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr review --approve "${{ steps.pr_info.outputs.url }}"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
