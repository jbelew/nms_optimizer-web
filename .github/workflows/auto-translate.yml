name: Auto-Translate (Gemini AI)

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/locales/en/**'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-node@v6 # Just for general stability, we use python below
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Run translation script
        run: python scripts/translate.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(l10n): auto-translate keys using Gemini AI"
          file_pattern: 'public/assets/locales/**'
