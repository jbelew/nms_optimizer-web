name: Auto-Translate (Gemini AI)

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/locales/en/**'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed translation files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: public/assets/locales/en/**

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run translation script
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          python scripts/translate.py --files $CHANGED_FILES

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(l10n): auto-translate changed keys using Gemini AI"
          file_pattern: 'public/assets/locales/**'
