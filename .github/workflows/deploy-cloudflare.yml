name: Deploy to Cloudflare Pages (Validation)

on:
  workflow_run:
    workflows: ["Release & Publish"]
    types: [completed]
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'functions/**'
      - '.github/workflows/deploy-cloudflare.yml'

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: https://api.nms-optimizer.app/
          VITE_WS_URL: wss://nms-optimizer-service-afebcfd47e2a.herokuapp.com
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENV: production
          VITE_USE_SERVER_ANALYTICS: "false"
          VITE_DUAL_ANALYTICS: "true"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nms-optimizer-web --branch=main
