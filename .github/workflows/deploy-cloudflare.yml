name: Deploy to Cloudflare Pages (Prod & Staging)

on:
  workflow_run:
    workflows: ["Release & Publish"]
    types: [completed]
  push:
    branches:
      - dev

concurrency:
  group: deploy-cloudflare-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Run validation tests only for staging (main is validated by Release & Publish)
      - name: Validation (Staging Only)
        if: github.ref == 'refs/heads/dev'
        run: |
          npm run format:check
          npm run lint
          npm run lint:css
          npm run typecheck
          npm run test:ci

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: https://api.nms-optimizer.app/
          VITE_WS_URL: wss://nms-optimizer-service-afebcfd47e2a.herokuapp.com
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENV: ${{ (github.ref == 'refs/heads/dev') && 'staging' || 'production' }}
          VITE_BUILD_VERSION: ${{ github.run_number }}
          VITE_USE_SERVER_ANALYTICS: "false"
          VITE_DUAL_ANALYTICS: "true"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Branch is dynamically set: 'main' for production, 'dev' for staging
          command: pages deploy dist --project-name=nms-optimizer-web --branch=${{ github.ref_name == 'main' && 'main' || 'dev' }}
