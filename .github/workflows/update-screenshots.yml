name: Update Screenshots on Version Bump

on:
    workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
    update-screenshots:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup environment
              uses: ./.github/actions/setup-node-env

            - name: Get App Version from package.json
              id: get_app_version
              run: |
                  VERSION=$(bun -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Install Playwright Browsers
              run: bunx playwright install --with-deps chromium

            - name: Start production build preview
              run: |
                  bun run build
                  bun run preview -- --port 3000 &
                  sleep 5

            - name: Run screenshot script
              run: BASE_URL=http://localhost:3000 bun run screenshot

            - name: Commit and push screenshots
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  # Stage ALL changes (including untracked files from the script)
                  git add .
                  if git diff --staged --quiet; then
                    echo "No screenshot changes to commit"
                  else
                    git commit --no-verify -m "chore: update screenshots for ${{ github.ref_name }}"
                    # Fix race condition: fetch, rebase, and push
                    git fetch origin main
                    git rebase origin/main
                    git push origin HEAD:main
                  fi
