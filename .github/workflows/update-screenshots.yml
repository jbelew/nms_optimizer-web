name: Update Screenshots on Version Bump

on:
    workflow_dispatch:

permissions:
  contents: write

jobs:
    update-screenshots:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup environment
              uses: ./.github/actions/setup-node-env

            - name: Get App Version from package.json
              id: get_app_version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "App Version from package.json: $VERSION"

            - name: Build application
              env:
                  VITE_APP_VERSION: ${{ steps.get_app_version.outputs.version }}
              run: npm run build

            - name: Start server
              run: |
                  npm start &
                  npx wait-on http://localhost:3000 --timeout 60000

            - name: Run screenshot script
              run: BASE_URL=http://localhost:3000 npm run screenshot

            - name: Commit and push screenshots
              env:
                  REF_NAME: ${{ github.ref_name }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add public/assets/img/screenshots/*.png
                  if git diff --staged --quiet; then
                    echo "No screenshot changes to commit"
                  else
                    git commit --no-verify -m "chore: update screenshots for $REF_NAME"
                    # Fix race condition: fetch, rebase, and push
                    git fetch origin main
                    git rebase origin/main
                    git push origin HEAD:main
                  fi
