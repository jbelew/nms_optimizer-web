name: Update Screenshots on Version Bump

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
    update-screenshots:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"


            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Get App Version from package.json
              id: get_app_version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "App Version from package.json: $VERSION"

            - name: Build application
              env:
                  VITE_APP_VERSION: ${{ steps.get_app_version.outputs.version }}
              run: npm run build

            - name: Start server
              run: |
                  npm start &
                  npx wait-on http://localhost:3000 --timeout 60000

            - name: Run screenshot script
              run: BASE_URL=http://localhost:3000 npm run screenshot

            - name: Create Pull Request for Screenshots
              uses: peter-evans/create-pull-request@v8
              with:
                  commit-message: "chore: update screenshots for ${{ github.ref_name }}"
                  committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
                  author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
                  branch: "automation/update-screenshots-${{ github.ref_name }}"
                  title: "chore: update screenshots for ${{ github.ref_name }}"
                  body: |
                    Automated screenshot update following version bump to `${{ github.ref_name }}`.
                    Please review visual changes before merging.
                  labels: |
                    automation
                    screenshots
                  delete-branch: true
                  base: main
