name: CI Pipeline

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '.beads/**'
      - 'CHANGELOG.md'
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.beads/**'
      - 'CHANGELOG.md'
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  lint-test:
    name: Lint, Typecheck & Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Check formatting
        run: npm run format:check

      - name: Run JS linter
        run: npm run lint

      - name: Run CSS linter
        run: npm run lint:css

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:ci

  build:
    name: Build Application (Verification)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build-version: ${{ steps.build_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Set Build Version
        id: build_version
        uses: ./.github/actions/get-build-version

      - name: Build project (Staging/Verification)
        run: npm run build
        env:
          VITE_SENTRY_ENV: staging
          VITE_BUILD_VERSION: ${{ steps.build_version.outputs.version }}
          # Conditionally pass Sentry secrets to avoid failures on fork PRs
          VITE_SENTRY_DSN: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.VITE_SENTRY_DSN || '' }}
          SENTRY_AUTH_TOKEN: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.SENTRY_PROJECT || '' }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-bundle
          path: dist/
          retention-days: 1

      - name: Build project (E2E)
        run: npm run build:e2e

      - name: Upload E2E dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-e2e
          path: dist/
          retention-days: 1

  lighthouse:
    name: Lighthouse Audit & History
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-bundle
          path: dist/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: "./scripts/lighthouserc.cjs"
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Lighthouse History Branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/checkout@v6
        with:
          ref: lighthouse-check
          path: history-dir
        continue-on-error: true

      - name: Update Performance History Dashboard
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          mkdir -p history-dir
          node scripts/update-lighthouse-history.mjs .lighthouseci history-dir "$GITHUB_SHA_ENV"
          cp scripts/lighthouse-dashboard.html history-dir/index.html
        env:
          GITHUB_SHA_ENV: ${{ github.sha }}

      - name: Deploy Lighthouse History
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: history-dir
          branch: lighthouse-check
          clean: false # Keep previous reports

  storybook-test:
    name: Storybook Interaction, A11y & Chromatic
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook -- --webpack-stats-json

      - name: Run Storybook Interaction Tests
        run: npm run test:storybook

      - name: Run Storybook A11y Tests
        run: npm run test:storybook:a11y

      - name: Run Chromatic visual tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          onlyChanged: true
          exitOnceUploaded: true
          exitZeroOnChanges: true

  e2e-test:
    name: E2E Verification (Playwright)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Download E2E dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-e2e
          path: dist/

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E Tests
        run: npx playwright test --project=chromium --project=firefox --project=webkit
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  release:
    name: Release
    needs: [lint-test, build, storybook-test, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.check_release.outputs.released }}
      tag: ${{ steps.check_release.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx semantic-release

      - name: Check if release was created
        id: check_release
        shell: bash
        run: |
          git fetch --tags
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
            TAG=$(git describe --exact-match --tags HEAD)
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  build-production:
    name: Build Application (Production)
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build-version: ${{ steps.build_version.outputs.version }}
      effective-tag: ${{ steps.version_logic.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || github.sha }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-node-env

      - name: Determine Effective Version
        id: version_logic
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            echo "version=$RELEASE_TAG" >> $GITHUB_OUTPUT
          else
            # Fallback to package.json version only (keep UI/GA4 clean)
            PACKAGE_VERSION=$(node -p "require('./package.json').version")
            echo "version=v${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Set Build Tracking ID
        id: build_version
        uses: ./.github/actions/get-build-version

      - name: Build project (Production)
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version_logic.outputs.version }}
          VITE_BUILD_VERSION: ${{ steps.build_version.outputs.version }}
          VITE_SENTRY_ENV: production
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Upload production artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-production
          path: dist/
          retention-days: 1

  deploy-production-cloudflare:
    name: Deploy to Cloudflare (Production)
    needs: [build-production, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || github.sha }}

      - name: Download production artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-production
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nms-optimizer-web --branch=main

      - name: Purge Cloudflare Cache
        run: |
          curl -f -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'

  deploy-production-heroku:
    name: Deploy to Heroku (Production)
    needs: [build-production, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || github.sha }}
          fetch-depth: 0

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.15.15
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: "nms-optimizer-web"
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          # Use HEAD to push the exact release commit/tag checked out above
          branch: HEAD
        env:
          HD_VITE_APP_VERSION: ${{ needs.build-production.outputs.effective-tag }}
          HD_VITE_BUILD_VERSION: ${{ needs.build-production.outputs.build-version }}
          HD_VITE_SENTRY_ENV: production

  post-deploy-production:
    name: Finalize Production
    needs: [deploy-production-cloudflare, deploy-production-heroku, release]
    # Only fire downstream triggers (Docker/Screenshots) on literal version bumps
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger Downstream Jobs
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG || 'main';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'publish-images.yml', ref: tag
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'update-screenshots.yml', ref: tag
            });

  deploy-staging:
    name: Deploy to Staging (Cloudflare)
    needs: [lint-test, build, storybook-test, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-bundle
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nms-optimizer-web --branch=dev
