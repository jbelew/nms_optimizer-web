name: CI Pipeline

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '.beads/**'
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.beads/**'
      - 'CHANGELOG.md'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, Typecheck & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check formatting
        run: npm run format:check

      - name: Run JS linter
        run: npm run lint

      - name: Run CSS linter
        run: npm run lint:css

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:ci

  build:
    name: Build Application (Verification)
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.build_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set Build Version
        id: build_version
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          echo "version=${COUNT}-${SHA}" >> $GITHUB_OUTPUT

      - name: Build project (Staging/Verification)
        run: npm run build
        env:
          VITE_SENTRY_ENV: staging
          VITE_BUILD_VERSION: ${{ steps.build_version.outputs.version }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle
          path: dist/
          retention-days: 1

  lighthouse:
    name: Lighthouse Audit & History
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-bundle
          path: dist/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: "./scripts/lighthouserc.cjs"
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Lighthouse History Branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/checkout@v6
        with:
          ref: lighthouse-check
          path: history-dir
        continue-on-error: true

      - name: Update Performance History Dashboard
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          mkdir -p history-dir
          node scripts/update-lighthouse-history.mjs .lighthouseci history-dir ${{ github.sha }}
          cp scripts/lighthouse-dashboard.html history-dir/index.html

      - name: Deploy Lighthouse History
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: history-dir
          branch: lighthouse-check
          clean: false # Keep previous reports

  release:
    name: Release
    needs: [lint-test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check_release.outputs.released }}
      tag: ${{ steps.check_release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx semantic-release
      - name: Check if release was created
        id: check_release
        run: |
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
            TAG=$(git describe --exact-match --tags HEAD)
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  build-production:
    name: Build Application (Production)
    needs: [release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.build_version.outputs.version }}
      effective-tag: ${{ steps.version_logic.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Determine Effective Version
        id: version_logic
        run: |
          if [ "${{ needs.release.outputs.released }}" == "true" ]; then
            echo "version=${{ needs.release.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "version=${LATEST_TAG}-dev.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Set Build Tracking ID
        id: build_version
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          echo "version=${COUNT}-${SHA}" >> $GITHUB_OUTPUT

      - name: Build project (Production)
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version_logic.outputs.version }}
          VITE_BUILD_VERSION: ${{ steps.build_version.outputs.version }}
          VITE_SENTRY_ENV: production

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/
          retention-days: 1

  deploy-production-cloudflare:
    name: Deploy to Cloudflare (Production)
    needs: [build-production, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download production artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-production
          path: dist/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nms-optimizer-web --branch=main
      - name: Purge Cloudflare Cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'

  deploy-production-heroku:
    name: Deploy to Heroku (Production)
    needs: [build-production, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || github.sha }}
          fetch-depth: 0
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: "nms-optimizer-web"
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          # Use HEAD to push the exact release commit/tag checked out above
          branch: HEAD
        env:
          HD_VITE_APP_VERSION: ${{ needs.build-production.outputs.effective-tag }}
          HD_VITE_BUILD_VERSION: ${{ needs.build-production.outputs.build-version }}
          HD_VITE_SENTRY_ENV: production
          HD_VITE_USE_SERVER_ANALYTICS: "false"
          HD_VITE_DUAL_ANALYTICS: "true"

  post-deploy-production:
    name: Finalize Production
    needs: [deploy-production-cloudflare, deploy-production-heroku, release]
    # Only fire downstream triggers (Docker/Screenshots) on literal version bumps
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Downstream Jobs
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ needs.release.outputs.tag }}' || '';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'publish-images.yml', ref: tag || 'main'
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'update-screenshots.yml', ref: tag || 'main'
            });

  deploy-staging:
    name: Deploy to Staging (Cloudflare)
    needs: [lint-test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-bundle
          path: dist/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nms-optimizer-web --branch=dev
