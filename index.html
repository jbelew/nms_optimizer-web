		<script>
			(function () {
				var MARKER = "__preload_recovery__";

				// The marker is cleared by main.tsx upon successful application boot.

				// Handle stale chunk loading after deployment.
				// One auto-reload attempt with cache-busting; if that fails,
				// redirect to /500.html with error context.
				function handleStaleChunkError(payloadMessage) {
					try {
						if (!sessionStorage.getItem(MARKER)) {
							sessionStorage.setItem(MARKER, "1");
							// Cache-busting query param forces a fresh index.html from the CDN
							window.location.replace(window.location.pathname + "?_cb=" + Date.now());
							return;
						}
					} catch (e) {
						// sessionStorage blocked (rare): fall through to error page
					}

					// Reload already attempted ‚ÄĒ redirect to dedicated error page
					try {
						sessionStorage.removeItem(MARKER);
					} catch (e) {}
					var errorUrl = "/500.html?error_type=stale_chunk";
					if (payloadMessage) {
						errorUrl += "&error_cause=" + encodeURIComponent(payloadMessage);
					}
					window.location.replace(errorUrl);
				}

				window.addEventListener("vite:preloadError", function (event) {
					event.preventDefault();
					handleStaleChunkError(event.payload && event.payload.message);
				});

				// Catch static import failures (which bypass vite:preloadError)
				window.addEventListener(
					"error",
					function (event) {
						var msg = (event.message || "").toLowerCase();
						var isModuleError =
							msg.includes("importing a module script failed") ||
							msg.includes("error resolving module specifier") ||
							msg.includes("failed to fetch dynamically imported module");

						var isScriptElementError = event.target && event.target.nodeName === "SCRIPT";

						if (isModuleError || isScriptElementError) {
							// Only handle errors originating from our own build chunks
							var src = event.target && event.target.src ? event.target.src : "";
							if (isModuleError || src.includes("/build/")) {
								event.preventDefault();
								handleStaleChunkError(event.message || "Script load error");
							}
						}
					},
					true
				);
				// Preload translations based on language in path (matches i18next logic)
				const supportedLngs = ["en", "es", "fr", "de", "pt", "it"];
				const pathParts = window.location.pathname.split("/");
				const detectedLng = supportedLngs.includes(pathParts[1]) ? pathParts[1] : "en";
				const link = document.createElement("link");
				link.id = "preload-translations";
				link.rel = "preload";
				link.as = "fetch";
				link.type = "application/json";
				link.href = "/assets/locales/" + detectedLng + "/translation.json";
				link.crossOrigin = "anonymous";
				link.setAttribute("fetchpriority", "high");
				document.head.appendChild(link);

				// --- PRELOAD API DATA FOR LCP OPTIMIZATION ---
				// 1. Heuristically guess the selected platform safely
				let platform = "standard";
				try {
					const queryPlatform = new URLSearchParams(window.location.search).get("platform");
					const storagePlatform = localStorage.getItem("selectedPlatform");
					if (queryPlatform) platform = queryPlatform;
					else if (storagePlatform) platform = storagePlatform;
				} catch (e) {}

				// We use the same API URL already hardcoded in the <link rel="preconnect"> below
				const apiUrl = "https://api.nms-optimizer.app";

				// 2. Preload Base Platforms Dictionary
				const platformsLink = document.createElement("link");
				platformsLink.rel = "preload";
				platformsLink.as = "fetch";
				platformsLink.href = apiUrl + "/platforms";
				platformsLink.crossOrigin = "anonymous";
				platformsLink.setAttribute("fetchpriority", "high");
				document.head.appendChild(platformsLink);

				// 3. Preload Tech Tree Payload
				const techTreeLink = document.createElement("link");
				techTreeLink.rel = "preload";
				techTreeLink.as = "fetch";
				techTreeLink.href = apiUrl + "/tech_tree/" + encodeURIComponent(platform);
				techTreeLink.crossOrigin = "anonymous";
				techTreeLink.setAttribute("fetchpriority", "high");
				document.head.appendChild(techTreeLink);
				// ---------------------------------------------

				// Detect if this is a bot/crawler or headless browser
				const isBot =
					/bot|crawler|spider|headless|phantom|webdriver|google|lighthouse|chrome-lighthouse/i.test(
						navigator.userAgent
					) || navigator.webdriver === true;

				if (isBot) {
					document.documentElement.classList.add("is-bot");
				}
			})();
		</script>
