	<!-- Critical Data Preload: Dynamic script to preload the correct tech tree and platforms based on URL -->
	<script>
		try {
			// Parse the current URL parameters
			const urlParams = new URLSearchParams(window.location.search);
			const platform = urlParams.get("platform") || "standard";

			// Whitelist of valid platforms to prevent XSS or invalid requests
			const validPlatforms = [
				"standard", "standard-mt", "sentinel", "sentinel-mt", "atlantid",
				"staves", "living", "exosuit", "freighter", "roamer", "pilgrim",
				"nomad", "colossus", "minotaur", "nautilon", "corvette", "solar", "fighter"
			];

			// Preload tech tree
			const techTreePreload = document.createElement("link");
			techTreePreload.rel = "preload";
			techTreePreload.as = "fetch";
			techTreePreload.crossOrigin = "anonymous";
			techTreePreload.href = `https://api.nms-optimizer.app/tech_tree/${platform}`;
			techTreePreload.setAttribute("fetchpriority", "high");
			document.head.appendChild(techTreePreload);

			// Preload platforms list (core dependency for ship selection)
			const platformsPreload = document.createElement("link");
			platformsPreload.rel = "preload";
			platformsPreload.as = "fetch";
			platformsPreload.crossOrigin = "anonymous";
			platformsPreload.href = "https://api.nms-optimizer.app/platforms";
			platformsPreload.setAttribute("fetchpriority", "high");
			document.head.appendChild(platformsPreload);
		} catch (e) {
			// Fail silently, app will handle fetching normally
			console.warn("Preload script failed", e);
		}
	</script>

	<script>
		(function () {
			const id = "vpss";
			const url = new URL(window.location.href);
			const urlParams = new URLSearchParams(url.search)
			const param = urlParams.get(id);

			// Setup global options
			window.__VPSS__ = {
				id: id,
				hidden: param === "false",
				renderedAt: new Date().getTime(),
				minDurationMs: 0,
				getElement: function () {
					return document.getElementById(id);
				},
				getStyles: function () {
					return document.getElementById(id + "-style");
				},
				show: function () {
					const element = this.getElement();
					if (!element) return;

					element.style.visibility = "visible";
				},
				hide: async function () {
					const element = this.getElement();
					if (!element) return;

					// Set hidden flag to prevent multiple calls
					this.hidden = true;

					// Optionally wait for minDurationMs before starting animation
					if (
						this.minDurationMs !== undefined &&
						this.renderedAt !== undefined
					) {
						const elapsedTime = new Date().getTime() - this.renderedAt;
						const remainingTime = Math.max(this.minDurationMs - elapsedTime, 0);
						await new Promise((resolve) => setTimeout(resolve, remainingTime));
					}

					const animation = element.animate(
						[{ opacity: 1 }, { opacity: 0 }],
						{ duration: 200, easing: "ease-out", fill: "forwards" }
					);

					animation.onfinish = () => {
						this.remove();
					};
				},
				remove: function () {
					const element = this.getElement();
					const styles = this.getStyles();

					if (element && styles) {
						element.remove();
						styles.remove();
					}
				}
			};

			if (window.__VPSS__.hidden) {
				window.__VPSS__.remove();
			} else {
				window.__VPSS__.show();
			}

			// Remove query param from URL
			if (param) {
				urlParams.delete(id);
				url.search = urlParams.toString();
				window.history.replaceState({}, "", url);
			}
		})();
