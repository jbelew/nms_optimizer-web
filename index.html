	<script>
		(function () {
			var MAX_INIT_RETRIES = 2;
			var initRecoveryStarted = false;

			/**
			 * Returns true if the URL is a same-origin app bundle asset (Vite output).
			 * Only these are critical enough to warrant a reload on failure.
			 */
			function isAppAssetUrl(url) {
				if (!url) return false;
				try {
					var u = new URL(url, window.location.href);
					return u.origin === window.location.origin && u.pathname.startsWith('/assets/');
				} catch (e) {
					return false;
				}
			}

			/**
			 * Reads the retry count from the URL search param (source of truth).
			 * Returns 0 for missing or malformed values.
			 */
			function getRetryCount() {
				var raw = new URL(window.location.href).searchParams.get('init_retry');
				var n = Number(raw);
				return Number.isInteger(n) && n >= 0 ? n : 0;
			}

			/**
			 * Critical error handler for initial script/chunk loading failures.
			 * Triggered when a required app bundle asset 404s after a deployment.
			 */
			function handleInitError(info) {
				if (initRecoveryStarted) return;
				initRecoveryStarted = true;

				console.error("Critical initialization failure:", info);

				var retryCount = getRetryCount();

				if (retryCount < MAX_INIT_RETRIES) {
					var nextCount = retryCount + 1;
					try {
						sessionStorage.setItem("init_reload_count", nextCount.toString());
					} catch (e) {}

					var url = new URL(window.location.href);
					url.searchParams.set("init_retry", String(nextCount));
					window.location.replace(url.toString());
				} else {
					// Render fallback error UI
					if (document.body) {
						document.querySelectorAll('link[rel="stylesheet"], style').forEach(function (el) { el.remove(); });

						var style = document.createElement('style');
						style.textContent = `
							body {
								background-color: #000 !important;
								color: #e2e8f0 !important;
								font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif !important;
								display: flex !important;
								justify-content: center !important;
								align-items: center !important;
								height: 100vh !important;
								margin: 0 !important;
								text-align: center !important;
								line-height: normal !important;
							}
							.container {
								max-width: 600px;
								padding: 2rem;
							}
							h1 {
								color: rgb(255 197 61) !important;
								font-weight: bold !important;
								font-size: 1.5rem !important;
								margin-top: 0.5rem !important;
								margin-bottom: 0 !important;
								letter-spacing: 0.1em !important;
							}
							p {
								margin-top: 0 !important;
								margin-bottom: 1.5rem !important;
							}
							.error-refresh-btn {
								color: white !important;
								background-color: #00a2c7 !important;
								text-decoration: none !important;
								font-weight: 400 !important;
								border: 2px solid #00a2c7 !important;
								padding: 0.25rem .5rem !important;
								border-radius: 0.25rem !important;
								transition: background-color 0.2s, color 0.2s !important;
								cursor: pointer !important;
								font-family: inherit !important;
							}
							.vpss-logo svg {
								width: 48px !important;
								height: 48px !important;
							}
						`;
						document.head.appendChild(style);

						document.body.className = '';
						document.body.removeAttribute('style');
						document.body.innerHTML = '<div class="container">' +
							'<div class="vpss-logo" style="display: flex !important; justify-content: center !important; margin: 0 !important; padding: 0 !important;">' +
							'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 126.75 126.77" style="display: block !important; margin: 0 auto !important;"><path fill="#fff" d="m62.02 1.25-1.35 1.21S44.69 16.22 44.69 39.87v24.14h-9.66v9.66H15.72V25.4H6.07v33.79H1.24v53.1h14.48v-7.53l19.31 6.95v15.06h9.65v-11.63l4.83 1.83v9.8h9.65v-6.32l3.19 1.21 1.64.58 1.64-.58 3.19-1.21v6.32h9.65v-9.8l4.83-1.83v11.63h9.65v-15.06l19.31-6.95v7.53h14.49v-53.1h-4.83V25.4h-9.65v48.27H92.96v-9.66H83.3V39.87c0-23.65-15.98-37.41-15.98-37.41l-1.35-1.21h-3.95zM64 13.46c3.52 3.81 9.65 11.68 9.65 26.4V64h-4.83V44.69h-9.65V64h-4.83V39.86c0-14.72 6.18-22.59 9.65-26.4H64zM44.69 73.65h38.62v19.31h9.65v-9.65h19.31v11.15L64 111.98 15.73 94.46V83.31h19.31v9.65h9.65V73.65zm4.83 4.83c0 8.01 6.47 14.48 14.48 14.48 8.01 0 14.48-6.47 14.48-14.48h-9.65c0 2.65-2.17 4.83-4.83 4.83-2.65 0-4.83-2.17-4.83-4.83h-9.65z"/></svg>' +
							'</div>' +
							'<h1 style="color: rgb(255 197 61); font-weight: bold; font-size: 1.5rem; margin-top: 0.5rem; margin-bottom: 0; letter-spacing: 0.1em;">-kzzkt- Application Load Error -kzzkt-</h1>' +
							'<p>We are having trouble loading the required application files. This usually happens when the app has been updated.</p>' +
							'<button onclick="var u=new URL(location);u.searchParams.delete(\'init_retry\');try{sessionStorage.removeItem(\'init_reload_count\');}catch(e){}location.replace(u);" class="error-refresh-btn">Refresh Now</button>' +
							'</div>';
					} else {
						initRecoveryStarted = false;
						setTimeout(function () { handleInitError(info); }, 100);
					}
				}
			}

			// Listen for Vite chunk load errors (dynamic imports)
			window.addEventListener("vite:preloadError", function (event) {
				event.preventDefault();
				handleInitError({ type: 'vite:preloadError', cause: event.payload });
			});

			// Listen for static script/link load failures (initial bundle)
			window.addEventListener("error", function (e) {
				var target = e.target;

				if (target instanceof HTMLScriptElement) {
					if (!isAppAssetUrl(target.src)) return;
					handleInitError({ type: 'script-load', cause: e, target: target });
					return;
				}

				if (target instanceof HTMLLinkElement) {
					// Ignore non-critical preloads (translations, API prefetches)
					if (target.rel === 'preload' && target.as === 'fetch') return;
					// Only treat modulepreload and stylesheet failures as critical
					if (target.rel !== 'modulepreload' && target.rel !== 'stylesheet') return;
					if (!isAppAssetUrl(target.href)) return;
					handleInitError({ type: 'link-load', cause: e, target: target });
					return;
				}

				if ((e.message || "").includes("Importing a module script failed")) {
					handleInitError({ type: 'safari-module-load', cause: e });
				}
			}, true); // Use capture phase to catch resource errors


			// Preload translations based on language in path (matches i18next logic)
			const supportedLngs = ["en", "es", "fr", "de", "pt"];
			const pathParts = window.location.pathname.split('/');
			const detectedLng = supportedLngs.includes(pathParts[1]) ? pathParts[1] : 'en';
			const link = document.createElement('link');
			link.id = 'preload-translations';
			link.rel = 'preload';
			link.as = 'fetch';
			link.type = 'application/json';
			link.href = '/assets/locales/' + detectedLng + '/translation.json';
			link.crossOrigin = 'anonymous';
			link.setAttribute('fetchpriority', 'high');
			document.head.appendChild(link);

			// --- PRELOAD API DATA FOR LCP OPTIMIZATION ---
			// 1. Heuristically guess the selected platform safely
			let platform = "standard";
			try {
				const queryPlatform = new URLSearchParams(window.location.search).get("platform");
				const storagePlatform = localStorage.getItem("selectedPlatform");
				if (queryPlatform) platform = queryPlatform;
				else if (storagePlatform) platform = storagePlatform;
			} catch (e) {}

			// We use the same API URL already hardcoded in the <link rel="preconnect"> below
			const apiUrl = "https://api.nms-optimizer.app";

			// 2. Preload Base Platforms Dictionary
			const platformsLink = document.createElement('link');
			platformsLink.rel = 'preload';
			platformsLink.as = 'fetch';
			platformsLink.href = apiUrl + '/platforms';
			platformsLink.crossOrigin = 'anonymous';
			platformsLink.setAttribute('fetchpriority', 'high');
			document.head.appendChild(platformsLink);

			// 3. Preload Tech Tree Payload
			const techTreeLink = document.createElement('link');
			techTreeLink.rel = 'preload';
			techTreeLink.as = 'fetch';
			techTreeLink.href = apiUrl + '/tech_tree/' + platform;
			techTreeLink.crossOrigin = 'anonymous';
			techTreeLink.setAttribute('fetchpriority', 'high');
			document.head.appendChild(techTreeLink);
			// ---------------------------------------------

			// Detect if this is a bot/crawler or headless browser
			const isBot = /bot|crawler|spider|headless|phantom|webdriver|google|lighthouse|chrome-lighthouse/i.test(navigator.userAgent) ||
				navigator.webdriver === true;

			if (isBot) {
				document.documentElement.classList.add('is-bot');
			}
		})();

			<section>
				<h2>What Is an Adjacency Bonus?</h2>
				<p>
					When you place compatible technology modules next to each other in No Man's Sky,
					they get a stat boost. The game doesn't tell you much about how this works, but
					the short version: modules of the same type that share an edge get a percentage
					increase to their stats. The more edges shared, the bigger the bonus. Figuring
					out the right arrangement by hand is tedious, especially on larger grids with
					supercharged slots to account for.
				</p>
			</section>

			<section>
				<h2>What Are Supercharged Slots?</h2>
				<p>
					Some inventory slots in No Man's Sky are supercharged. Any technology module
					placed in one gets a large stat multiplier on top of normal adjacency bonuses.
					They're randomly placed on each piece of gear, so the optimal layout changes
					depending on where your supercharged slots landed. That's the hard part, and
					it's what this tool is built to solve.
				</p>
			</section>

			<section>
				<h2>How It Works</h2>
				<p>
					The optimizer uses a combination of deterministic pattern matching and simulated
					annealing. For smaller module sets it can find the exact best layout. For larger
					or more complex grids, simulated annealing explores thousands of arrangements
					to find one that scores as high as possible. The scoring accounts for adjacency
					bonuses, supercharged slot placement, and module-specific stat weights. The
					backend runs in Rust for speed.
				</p>
