# Lefthook configuration for nms_optimizer-web
# Faster, Bun-friendly git hooks
#
# Per-file-type commands run only against staged files matching their glob.
# A metadata-only commit will skip every file-scoped command automatically.

pre-commit:
  parallel: true
  commands:
    # ----- Policy gate (always runs) -----
    beads-enforcement:
      tags: policy
      run: |
        STAGED_FILES=$(git diff --cached --name-only)
        BEADS_MATCHES=$(printf '%s\n' "$STAGED_FILES" | grep -cE "^\.beads/" || true)
        CONDUCTOR_MATCHES=$(printf '%s\n' "$STAGED_FILES" | grep -cE "^conductor/|^plan\.md|^task\.md" || true)
        if [ "$BEADS_MATCHES" -gt 0 ] && [ "$CONDUCTOR_MATCHES" -eq 0 ]; then
          ACTIVE_TRACKS=$(grep -r "\"status\": \"in-progress\"" conductor/tracks/ 2>/dev/null | wc -l)
          if [ "$ACTIVE_TRACKS" -eq 0 ]; then
            echo "❌ ERROR: Beads data modified without corresponding Conductor context."
            echo "This project requires Beads to be used only in conjunction with Conductor."
            exit 1
          fi
        fi

    # ----- Lint & format (per-file-type, scoped to staged files) -----
    # oxlint + eslint run sequentially in one command to avoid races on --fix
    lint-js:
      tags: lint
      glob: "*.{js,jsx,ts,tsx,cjs,mjs}"
      run: bunx oxlint --fix {staged_files} && bunx eslint --fix {staged_files}
      stage_fixed: true

    stylelint:
      tags: lint
      glob: "*.scss"
      run: bunx stylelint --fix {staged_files}
      stage_fixed: true

    prettier:
      tags: format
      # Mirrors `bun run format` which only targets ./src
      glob: "src/**/*.{ts,tsx,js,jsx,cjs,mjs,css,scss,md,json,html}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true

    # ----- Whole-project checks (only when TS/TSX changes) -----
    typecheck:
      tags: types
      glob: "*.{ts,tsx}"
      # tsc -b uses project references and cannot be scoped to individual files
      run: bun run typecheck

    circular:
      tags: lint
      glob: "*.{ts,tsx}"
      run: bun run lint:circular

    knip:
      tags: lint
      glob: "*.{ts,tsx}"
      run: bun run lint:knip

    test:
      tags: test
      glob: "*.{ts,tsx}"
      run: bun run test:ci

    test-scripts:
      tags: test
      glob: "scripts/**/*.{ts,js,mjs,cjs}"
      run: bun run test:scripts

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
